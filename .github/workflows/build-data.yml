name: Scrape Guidelines Data

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - 'data/guidelines.json'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet requests

      - name: Scrape guideline index
        run: python scripts/scrape_guideline_index.py

      - name: Scrape all chapters
        run: python scripts/scrape_chapter_text.py --all

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — skip commit"
          else
            git commit -m "ci: scrape updated guideline data"
            git push
          fi